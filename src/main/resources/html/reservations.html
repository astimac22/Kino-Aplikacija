<!DOCTYPE html>
<html lang="hr">
<head>
    <title>Moje rezervacije</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
    <a href="/">Filmovi</a>
    <a href="/reservations">Moje rezervacije</a>
</nav>

<div class="container">

    <h1>Moje rezervacije</h1>

    <form class="lookup-form" method="GET" action="/reservations">
        <input
            type="email"
            name="email"
            value="{{email}}"
            placeholder="Unesite svoju e-poštu"
        >
        <button type="submit" class="button">Pretraži</button>
    </form>

    <div class="reservations-list">
        {{reservations}}
    </div>

    <a class="button button-secondary" href="/">Povratak na filmove</a>

</div>

</body>
</html>
