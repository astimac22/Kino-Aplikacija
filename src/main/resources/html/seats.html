<!DOCTYPE html>
<html lang="hr">
<head>
    <title>Sjedala</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
    <a href="/">Filmovi</a>
    <a href="/reservations">Moje rezervacije</a>
</nav>

<div class="container">

    <h1>Odabir sjedala</h1>

    <form method="POST" action="/reserve">

        <input type="hidden" name="screening" value="{{screeningId}}">

        <div class="customer-info">
            <h2>Vaši podaci</h2>
            <div class="customer-fields">
                <label for="name">Ime i prezime</label>
                <input type="text" id="name" name="name" placeholder="Ime i prezime" required>
                <label for="email">E-pošta</label>
                <input type="email" id="email" name="email" placeholder="E-pošta" required>
            </div>
        </div>

        <div class="seat-legend">
            <span class="legend-item"><span class="legend-box available"></span> Slobodno</span>
            <span class="legend-item"><span class="legend-box taken"></span> Zauzeto</span>
            <span class="legend-item"><span class="legend-box selected-legend"></span> Odabrano</span>
        </div>

        <div class="seats">
            {{seats}}
        </div>

        <button type="submit" class="button">Rezerviraj odabrana sjedala</button>

    </form>

    <br><br>
    <a class="button button-secondary" href="/">Povratak na filmove</a>

</div>

</body>
</html>
